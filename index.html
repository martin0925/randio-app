<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naplánuj rande 💗</title>
<meta property="og:title" content="Pozvánka na rande 💗">
<meta property="og:description" content="Naplánuj rande, nebo se podívej na pozvánku!">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh;
    background: linear-gradient(170deg, #fff0f5 0%, #ffe1ec 55%, #ffd3e3 100%);
    font-family: 'Quicksand', sans-serif; color: #5a2438;
    display: flex; justify-content: center;
    padding: 28px 16px 56px; overflow-x: hidden;
  }
  .card { width: 100%; max-width: 480px; position: relative; z-index: 1; }
  h1.title {
    font-family: 'Cormorant Garamond', serif; font-size: 2.3rem;
    font-weight: 600; text-align: center; margin: 0; color: #a8244e;
  }
  .sub { text-align: center; margin: 4px 0 26px; font-size: .92rem; color: #b06a85; }
  .section {
    background: rgba(255,253,254,.85); border: 1px solid #ffd1e0;
    border-radius: 20px; padding: 18px; margin-bottom: 16px;
    box-shadow: 0 4px 16px rgba(196,64,110,.07);
  }
  .label {
    font-family: 'Cormorant Garamond', serif; font-size: 1.3rem;
    font-weight: 600; color: #a8244e; margin: 0 0 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .cal-title { font-weight: 600; font-size: .98rem; }
  .nav {
    background: #ffe6ef; border: 1px solid #ffc3d8; color: #a8244e;
    border-radius: 10px; width: 34px; height: 34px; font-size: 1rem; cursor: pointer;
  }
  .nav:hover { background: #ffd3e3; }
  .grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
  .dow { text-align: center; font-size: .7rem; font-weight: 600; color: #c98aa3; padding: 4px 0; text-transform: uppercase; }
  .day {
    aspect-ratio: 1; border: none; background: transparent; border-radius: 50%;
    font-family: inherit; font-size: .85rem; color: #5a2438; cursor: pointer;
    transition: background .15s, transform .15s;
  }
  .day:hover:not(:disabled) { background: #ffdbe7; }
  .day:disabled { color: #dcb4c4; cursor: default; }
  .day.sel { background: #d8366c; color: #fff; font-weight: 600; transform: scale(1.08); }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    border: 1px solid #ffc3d8; background: #fff7fa; color: #5a2438;
    border-radius: 999px; padding: 8px 14px; font-family: inherit;
    font-size: .88rem; font-weight: 500; cursor: pointer;
  }
  .chip:hover { background: #ffe6ef; }
  .chip.sel { background: #d8366c; border-color: #d8366c; color: #fff; }
  .input {
    width: 100%; margin-top: 10px; border: 1px solid #ffc3d8; background: #fff;
    border-radius: 12px; padding: 10px 14px; font-family: inherit;
    font-size: .9rem; color: #5a2438; outline: none;
  }
  .input:focus { border-color: #d8366c; box-shadow: 0 0 0 3px #ffd3e3; }
  .acts { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap: 8px; }
  .act {
    border: 1px solid #ffc3d8; background: #fff7fa; border-radius: 14px;
    padding: 12px 10px; font-family: inherit; font-size: .82rem; font-weight: 500;
    color: #5a2438; cursor: pointer; text-align: center;
    transition: background .15s, transform .15s;
  }
  .act:hover { background: #ffe6ef; }
  .act.sel { background: #d8366c; border-color: #d8366c; color: #fff; transform: translateY(-2px); }
  .act .em { display: block; font-size: 1.5rem; margin-bottom: 4px; }
  .cta {
    width: 100%; border: none; border-radius: 999px; padding: 15px;
    font-family: inherit; font-size: 1.02rem; font-weight: 600; color: #fff;
    background: linear-gradient(120deg, #e2477d, #c2185b); cursor: pointer;
    box-shadow: 0 6px 20px rgba(194,24,91,.35); transition: transform .15s, opacity .15s;
  }
  .cta:hover:not(:disabled) { transform: translateY(-2px); }
  .cta:disabled { opacity: .45; cursor: default; box-shadow: none; }
  .invite {
    background: #fffdfd; border: 2px dashed #e2477d; border-radius: 22px;
    padding: 30px 24px; text-align: center;
    box-shadow: 0 10px 30px rgba(194,24,91,.15);
  }
  .invite.confirmed { border-style: solid; }
  .invite h2 {
    font-family: 'Cormorant Garamond', serif; font-size: 1.9rem;
    font-weight: 600; color: #a8244e; margin: 6px 0 4px;
  }
  .invite .big { font-size: 2.6rem; }
  .invite p { margin: 6px 0; font-size: .95rem; }
  .invite .detail { font-weight: 600; color: #c2185b; }
  .badge {
    display: inline-block; margin-top: 10px; padding: 6px 14px;
    border-radius: 999px; font-size: .8rem; font-weight: 600;
  }
  .badge.navrh { background: #fff3cd; color: #8a6d1a; }
  .badge.protinavrh { background: #ffe0b2; color: #9c5700; }
  .badge.potvrzeno { background: #d7f5dd; color: #1e7a36; }
  .row { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
  .row > * { flex: 1; min-width: 140px; }
  .secondary {
    border: 1px solid #ffc3d8; background: #fff7fa; color: #a8244e;
    border-radius: 999px; padding: 12px; font-family: inherit; font-weight: 600;
    font-size: .9rem; cursor: pointer;
  }
  .secondary:hover { background: #ffe6ef; }
  .primary {
    border: none; background: linear-gradient(120deg, #e2477d, #c2185b);
    color: #fff; border-radius: 999px; padding: 12px; font-family: inherit;
    font-weight: 600; font-size: .9rem; cursor: pointer;
  }
  .hearts { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
  .heart { position: absolute; bottom: -40px; font-size: 1.2rem; opacity: .5; animation: float linear infinite; }
  @keyframes float { to { transform: translateY(-110vh) rotate(20deg); opacity: 0; } }
  @media (prefers-reduced-motion: reduce) {
    .heart { display: none; }
    .day.sel, .act.sel { transform: none; }
  }
  button:focus-visible, .input:focus-visible { outline: 3px solid #c2185b; outline-offset: 2px; }
  .hidden { display: none; }
  .note { font-size: .8rem; color: #b06a85; margin-top: 10px; text-align: center; word-break: break-all; }
  .error { font-size: .85rem; color: #b3261e; background: #fde8e6; border: 1px solid #f5c6c0; border-radius: 12px; padding: 10px 14px; margin-top: 12px; text-align: center; }
  .live-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: #1e7a36; margin-right: 6px; animation: pulse 1.6s infinite;
  }
  @keyframes pulse { 50% { opacity: .3; } }
</style>
</head>
<body>

<div class="hearts" aria-hidden="true" id="hearts"></div>

<!-- ===== NAČÍTÁNÍ ===== -->
<div class="card" id="loading">
  <p class="sub" style="margin-top:40vh">Načítám… 💗</p>
</div>

<!-- ===== PLÁNOVAČ ===== -->
<div class="card hidden" id="planner">
  <h1 class="title" id="plannerTitle">Naplánuj rande</h1>
  <p class="sub" id="plannerSub">Vyber datum, čas a aktivitu — pak pošli odkaz 💌</p>

  <section class="section">
    <h2 class="label">📅 Kdy se uvidíme?</h2>
    <div class="cal-head">
      <button class="nav" id="prevM" aria-label="Předchozí měsíc">‹</button>
      <span class="cal-title" id="calTitle"></span>
      <button class="nav" id="nextM" aria-label="Další měsíc">›</button>
    </div>
    <div class="grid" id="calGrid"></div>
  </section>

  <section class="section">
    <h2 class="label">🕐 V kolik hodin?</h2>
    <div class="chips" id="timeChips"></div>
    <input class="input" type="time" id="customTime" aria-label="Vlastní čas">
  </section>

  <section class="section">
    <h2 class="label">💞 Co podnikneme?</h2>
    <div class="acts" id="actGrid"></div>
    <input class="input" type="text" id="customAct" placeholder="…nebo napiš vlastní nápad">
  </section>

  <section class="section">
    <h2 class="label">✍️ Tvoje jméno <span style="font-size:.8rem;font-family:Quicksand;color:#b06a85;font-weight:500">(nepovinné)</span></h2>
    <input class="input" style="margin-top:0" type="text" id="nameInput" placeholder="Ať druhá strana ví, od koho návrh je">
  </section>

  <button class="cta" id="sendBtn" disabled>Vyber datum, čas a aktivitu</button>
  <p class="note hidden" id="linkNote"></p>
  <p class="error hidden" id="plannerError"></p>
</div>

<!-- ===== POZVÁNKA / STAV RANDE ===== -->
<div class="card hidden" id="inviteView">
  <p class="sub" style="margin-bottom:10px"><span class="live-dot"></span>Sleduje se naživo — když druhá strana odpoví, uvidíš to hned</p>
  <div class="invite" id="inviteBox">
    <span class="big" id="invEmoji">💞</span>
    <h2 id="invTitle">Návrh rande</h2>
    <p class="detail" id="invAct"></p>
    <p id="invDate"></p>
    <p id="invTime"></p>
    <span class="badge navrh" id="invBadge">čeká na odpověď</span>
    <div class="row" id="actionRow">
      <button class="primary" id="confirmBtn">Jdu do toho! 💗</button>
      <button class="secondary" id="editBtn">✏️ Upravit podle sebe</button>
    </div>
  </div>
  <div class="row">
    <button class="secondary" id="icsBtn">📅 Uložit do kalendáře</button>
    <button class="secondary" id="newBtn">✨ Naplánovat jiné rande</button>
  </div>
  <p class="error hidden" id="inviteError"></p>
</div>

<script type="module">
  /* ============================================================
     1) Vlož sem svůj Firebase config:
        console.firebase.google.com → projekt → ⚙️ Project settings
        → Your apps → Web app (</>) → zkopíruj firebaseConfig
     ============================================================ */
  const firebaseConfig = {
    apiKey: "VLOZ_SVUJ_API_KEY",
    authDomain: "tvuj-projekt.firebaseapp.com",
    projectId: "tvuj-projekt",
    storageBucket: "tvuj-projekt.appspot.com",
    messagingSenderId: "123456789",
    appId: "1:123456789:web:abcdef"
  };

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore, collection, doc, addDoc, getDoc, updateDoc,
    onSnapshot, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const ACTIVITIES = [
    { id: "dinner",  emoji: "🍝", label: "Večeře při svíčkách" },
    { id: "picnic",  emoji: "🧺", label: "Piknik v parku" },
    { id: "walk",    emoji: "🌅", label: "Procházka při západu slunce" },
    { id: "cinema",  emoji: "🎬", label: "Kino" },
    { id: "cooking", emoji: "🥘", label: "Společné vaření doma" },
    { id: "wine",    emoji: "🍷", label: "Degustace vína" },
    { id: "trip",    emoji: "🌲", label: "Výlet do přírody" },
    { id: "sport",   emoji: "🏸", label: "Sportovní rande" },
    { id: "gallery", emoji: "🖼️", label: "Galerie či muzeum" }
  ];
  const TIMES = ["10:00","12:00","14:00","16:00","17:30","18:00","19:00","20:00"];
  const DAYS = ["Ne","Po","Út","St","Čt","Pá","So"];
  const MONTHS_GEN = ["ledna","února","března","dubna","května","června","července","srpna","září","října","listopadu","prosince"];
  const MONTHS = ["Leden","Únor","Březen","Duben","Květen","Červen","Červenec","Srpen","Září","Říjen","Listopad","Prosinec"];

  const $ = (id) => document.getElementById(id);
  const pad = (n) => (n < 10 ? "0" + n : "" + n);
  const fmtDate = (d) => `${DAYS[d.getDay()]} ${d.getDate()}. ${MONTHS_GEN[d.getMonth()]} ${d.getFullYear()}`;
  const findAct = (id) => ACTIVITIES.find((a) => a.id === id) || null;
  const baseUrl = () => location.origin + location.pathname;
  const parseDate = (s) => {
    const p = s.split("-").map(Number);
    return new Date(p[0], p[1] - 1, p[2]);
  };

  /* plovoucí srdíčka */
  {
    const box = $("hearts");
    for (let i = 0; i < 8; i++) {
      const s = document.createElement("span");
      s.className = "heart";
      s.textContent = i % 2 ? "💗" : "🌸";
      s.style.left = `${8 + i * 12}%`;
      s.style.animationDuration = `${9 + (i % 4) * 3}s`;
      s.style.animationDelay = `${i * 1.4}s`;
      s.style.fontSize = `${0.9 + (i % 3) * 0.4}rem`;
      box.appendChild(s);
    }
  }

  function shareLink(url, title, onDone) {
    if (navigator.share) {
      navigator.share({ title, url }).catch(() => {});
      onDone(url, true);
    } else if (navigator.clipboard?.writeText) {
      navigator.clipboard.writeText(url)
        .then(() => onDone(url, true))
        .catch(() => onDone(url, false));
    } else {
      onDone(url, false);
    }
  }

  function downloadIcs(plan) {
    const dp = plan.datum.split("-").map(Number);
    const t = plan.cas.split(":").map(Number);
    const start = `${dp[0]}${pad(dp[1])}${pad(dp[2])}T${pad(t[0])}${pad(t[1])}00`;
    const end = `${dp[0]}${pad(dp[1])}${pad(dp[2])}T${pad((t[0] + 2) % 24)}${pad(t[1])}00`;
    const label = (findAct(plan.aktivita)?.label || plan.aktivita).replace(/,/g, "\\,");
    const ics = [
      "BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//rande//CZ","BEGIN:VEVENT",
      `UID:${Date.now()}@rande`,
      `DTSTART:${start}`, `DTEND:${end}`,
      `SUMMARY:Rande 💗 ${label}`,
      "END:VEVENT","END:VCALENDAR"
    ].join("\r\n");
    const blob = new Blob([ics], { type: "text/calendar" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "rande.ics";
    a.click();
    URL.revokeObjectURL(a.href);
  }

  /* ====== Firebase init ====== */
  let db = null;
  let firebaseOk = false;
  try {
    if (!firebaseConfig.apiKey.startsWith("VLOZ_")) {
      const app = initializeApp(firebaseConfig);
      db = getFirestore(app);
      firebaseOk = true;
    }
  } catch (e) {
    console.error("Firebase init selhal:", e);
  }

  const params = new URLSearchParams(location.search);
  const randeId = params.get("id");

  /* ============================================================
     REŽIM POZVÁNKY — odkaz s ?id=..., živé sledování dokumentu
     ============================================================ */
  if (randeId && firebaseOk) {
    const ref = doc(db, "rande", randeId);
    let currentPlan = null;
    let unsubscribed = false;

    function renderPlan(data) {
      currentPlan = data;
      $("loading").classList.add("hidden");
      $("inviteView").classList.remove("hidden");

      const known = findAct(data.aktivita);
      const label = known ? known.label : data.aktivita;
      $("invEmoji").textContent = known ? known.emoji : "💞";
      $("invAct").textContent = label;
      $("invDate").textContent = "📅 " + fmtDate(parseDate(data.datum));
      $("invTime").textContent = "🕐 " + data.cas;

      const badge = $("invBadge");
      const box = $("inviteBox");
      const actions = $("actionRow");

      if (data.stav === "potvrzeno") {
        document.title = "Rande potvrzeno! 🎉";
        $("invEmoji").textContent = "🎉";
        $("invTitle").textContent = data.potvrdil
          ? `${data.potvrdil} jde do toho!`
          : "Rande je potvrzené!";
        badge.textContent = "potvrzeno ✓";
        badge.className = "badge potvrzeno";
        box.classList.add("confirmed");
        actions.classList.add("hidden");
      } else {
        document.title = "Pozvánka na rande 💗";
        $("invTitle").textContent = data.od
          ? `${data.od} tě zve na rande!`
          : "Návrh rande pro tebe!";
        badge.textContent = data.stav === "protinavrh" ? "protinávrh — čeká na odpověď" : "čeká na odpověď";
        badge.className = "badge " + (data.stav === "protinavrh" ? "protinavrh" : "navrh");
        box.classList.remove("confirmed");
        actions.classList.remove("hidden");
      }
    }

    onSnapshot(ref, (snap) => {
      if (!snap.exists()) {
        $("loading").classList.add("hidden");
        $("inviteView").classList.remove("hidden");
        $("inviteBox").innerHTML = "<span class='big'>🥀</span><h2>Tohle rande nebylo nalezeno</h2><p>Odkaz je možná neúplný nebo bylo rande smazáno.</p>";
        return;
      }
      renderPlan(snap.data());
    }, (err) => {
      $("loading").classList.add("hidden");
      $("inviteView").classList.remove("hidden");
      const e = $("inviteError");
      e.textContent = "Nepodařilo se načíst rande: " + err.message;
      e.classList.remove("hidden");
    });

    $("confirmBtn").addEventListener("click", async () => {
      const who = prompt("Tvoje jméno? (nepovinné — jen ať druhá strana ví, kdo potvrdil)") || "";
      try {
        await updateDoc(ref, {
          stav: "potvrzeno",
          potvrdil: who.trim(),
          potvrzeno_kdy: serverTimestamp()
        });
        /* onSnapshot překreslí UI sám */
      } catch (err) {
        const e = $("inviteError");
        e.textContent = "Potvrzení se nepodařilo uložit: " + err.message;
        e.classList.remove("hidden");
      }
    });

    $("editBtn").addEventListener("click", () => {
      if (!currentPlan) return;
      $("inviteView").classList.add("hidden");
      initPlanner({ editDoc: ref, prefill: currentPlan });
    });

    $("icsBtn").addEventListener("click", () => currentPlan && downloadIcs(currentPlan));
    $("newBtn").addEventListener("click", () => { location.href = baseUrl(); });
  }
  /* id v URL, ale Firebase nenastaven */
  else if (randeId && !firebaseOk) {
    $("loading").classList.add("hidden");
    $("inviteView").classList.remove("hidden");
    $("inviteBox").innerHTML = "<span class='big'>⚙️</span><h2>Aplikace není nastavená</h2><p>Do index.html je potřeba vložit Firebase config.</p>";
  }
  /* ============================================================
     REŽIM PLÁNOVAČE — prázdný odkaz
     ============================================================ */
  else {
    initPlanner({});
  }

  /* ====== PLÁNOVAČ (nový návrh i protinávrh) ====== */
  function initPlanner({ editDoc = null, prefill = null }) {
    $("loading").classList.add("hidden");
    $("planner").classList.remove("hidden");

    if (editDoc) {
      $("plannerTitle").textContent = "Uprav rande podle sebe";
      $("plannerSub").textContent = "Změň, co se ti nehodí, a odešli protinávrh 💌";
    }
    if (!firebaseOk) {
      const e = $("plannerError");
      e.textContent = "⚙️ Firebase config zatím není vyplněný — návrhy nepůjde uložit. Vlož config do index.html.";
      e.classList.remove("hidden");
    }

    const today = new Date(); today.setHours(0, 0, 0, 0);
    const sel = { date: null, time: null, customTime: "", act: null, customAct: "" };

    if (prefill) {
      const d = parseDate(prefill.datum);
      if (d >= today) sel.date = d;
      if (TIMES.includes(prefill.cas)) sel.time = prefill.cas;
      else sel.customTime = prefill.cas;
      if (findAct(prefill.aktivita)) sel.act = prefill.aktivita;
      else sel.customAct = prefill.aktivita;
    }

    const view = {
      y: (sel.date || today).getFullYear(),
      m: (sel.date || today).getMonth()
    };

    function renderCal() {
      $("calTitle").textContent = `${MONTHS[view.m]} ${view.y}`;
      const grid = $("calGrid");
      grid.innerHTML = "";
      ["Po","Út","St","Čt","Pá","So","Ne"].forEach((d) => {
        const s = document.createElement("span");
        s.className = "dow"; s.textContent = d;
        grid.appendChild(s);
      });
      const first = new Date(view.y, view.m, 1);
      const offset = (first.getDay() + 6) % 7;
      const dim = new Date(view.y, view.m + 1, 0).getDate();
      for (let i = 0; i < offset; i++) grid.appendChild(document.createElement("span"));
      for (let d = 1; d <= dim; d++) {
        const date = new Date(view.y, view.m, d);
        const b = document.createElement("button");
        b.className = "day"; b.textContent = d;
        if (date < today) b.disabled = true;
        if (sel.date && date.getTime() === sel.date.getTime()) b.classList.add("sel");
        b.addEventListener("click", () => { sel.date = date; renderCal(); update(); });
        grid.appendChild(b);
      }
    }

    function renderTimes() {
      const box = $("timeChips");
      box.innerHTML = "";
      TIMES.forEach((t) => {
        const b = document.createElement("button");
        b.className = "chip" + (!sel.customTime && sel.time === t ? " sel" : "");
        b.textContent = t;
        b.addEventListener("click", () => {
          sel.time = t; sel.customTime = ""; $("customTime").value = "";
          renderTimes(); update();
        });
        box.appendChild(b);
      });
    }

    function renderActs() {
      const box = $("actGrid");
      box.innerHTML = "";
      ACTIVITIES.forEach((a) => {
        const b = document.createElement("button");
        b.className = "act" + (!sel.customAct.trim() && sel.act === a.id ? " sel" : "");
        const em = document.createElement("span");
        em.className = "em"; em.textContent = a.emoji;
        b.appendChild(em);
        b.appendChild(document.createTextNode(a.label));
        b.addEventListener("click", () => {
          sel.act = a.id; sel.customAct = ""; $("customAct").value = "";
          renderActs(); update();
        });
        box.appendChild(b);
      });
    }

    const chosenTime = () => sel.customTime || sel.time;
    const chosenAct = () => sel.customAct.trim() || sel.act;

    function update() {
      const ready = sel.date && chosenTime() && chosenAct() && firebaseOk;
      const btn = $("sendBtn");
      btn.disabled = !ready;
      btn.textContent = sel.date && chosenTime() && chosenAct()
        ? (editDoc ? "Odeslat protinávrh 💌" : "Vytvořit a poslat návrh 💌")
        : "Vyber datum, čas a aktivitu";
    }

    if (sel.customTime) $("customTime").value = sel.customTime;
    if (sel.customAct) $("customAct").value = sel.customAct;

    $("customTime").addEventListener("input", (e) => {
      sel.customTime = e.target.value; sel.time = null; renderTimes(); update();
    });
    $("customAct").addEventListener("input", (e) => {
      sel.customAct = e.target.value; sel.act = null; renderActs(); update();
    });
    $("prevM").addEventListener("click", () => {
      if (view.m === 0) { view.y--; view.m = 11; } else view.m--;
      renderCal();
    });
    $("nextM").addEventListener("click", () => {
      if (view.m === 11) { view.y++; view.m = 0; } else view.m++;
      renderCal();
    });

    $("sendBtn").addEventListener("click", async () => {
      const d = sel.date;
      const plan = {
        datum: `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`,
        cas: chosenTime(),
        aktivita: chosenAct(),
        od: $("nameInput").value.trim()
      };
      const note = $("linkNote");
      const err = $("plannerError");
      err.classList.add("hidden");

      try {
        if (editDoc) {
          /* protinávrh: aktualizace stejného dokumentu — odkaz se nemění! */
          await updateDoc(editDoc, {
            ...plan,
            stav: "protinavrh",
            upraveno_kdy: serverTimestamp()
          });
          note.textContent = "Protinávrh uložen ✓ Druhá strana ho uvidí na stejném odkazu — ale klidně jí dej vědět 😉";
          note.classList.remove("hidden");
          $("sendBtn").textContent = "Protinávrh odeslán ✓";
          $("sendBtn").disabled = true;
          setTimeout(() => { location.reload(); }, 2500);
        } else {
          /* nový návrh: vytvoření dokumentu a sdílení krátkého odkazu */
          const docRef = await addDoc(collection(db, "rande"), {
            ...plan,
            stav: "navrh",
            vytvoreno: serverTimestamp()
          });
          const url = `${baseUrl()}?id=${docRef.id}`;
          shareLink(url, "Návrh rande 💗", (u, copied) => {
            note.textContent = copied
              ? `Odkaz je ve schránce — pošli ho 💗 Ty sám si ho ulož taky: uvidíš na něm, až druhá strana odpoví. ${u}`
              : `Zkopíruj a pošli (a ulož si ho i pro sebe): ${u}`;
            note.classList.remove("hidden");
            $("sendBtn").textContent = "Návrh vytvořen ✓";
          });
        }
      } catch (e2) {
        err.textContent = "Uložení se nepodařilo: " + e2.message;
        err.classList.remove("hidden");
      }
    });

    renderCal(); renderTimes(); renderActs(); update();
  }
</script>
</body>
</html>
